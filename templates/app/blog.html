{% extends 'base.html' %}

{% block content %}
<h1>{{ title }}</h1>
<div class="posts">
    {% for post in posts %}
    <div class="card">
        <img src="{{post.banner_photo_path}}" alt="Баннер">
        <div style="padding: 0 10px 10px 10px;">
            <h3>{{post.title}}</h3>
            <p>{{post.description}}</p>
            <button class="button-dark" onclick="redirect('{{post.url}}')">Читать</button>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
