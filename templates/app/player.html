
<!DOCTYPE html>
<html lang="ru-ru">
<head>
    <title>{{ title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/player.css') }}">
</head>
<body>
<header>
    <h1 class="alt-text-color">Хранилище Ramilische</h1>
</header>
<main style="justify-content: space-around;">
<div class="left">
    <nav>
        {% for item in nav %}
        <button class="button-dark" onclick="redirect('{{item.url}}')" style="width: 100%;">
            {{ item.title }}
        </button>
        {% endfor %}
    </nav>
</div>
<div class="center">

<div class="app">
  <div class="playlist-header">
    <h1>{{ album.title }}</h1>
    <p>{{ album.description }}</p>
  </div>

  <!-- контейнер для списка треков -->
  <div class="playlist-container" id="playlistContainer">
    <!-- треки будут вставлены через js -->
    <div class="empty-message">Загрузка треков...</div>
  </div>

  <!-- плеер -->
  <div class="player-bar">
    <div class="now-playing" id="nowPlayingInfo">
      <div class="now-cover" id="nowCover">
        
      </div>
      <div class="now-info">
        <div class="now-title" id="nowTitle">Не выбрано</div>
        <div class="now-artist" id="nowArtist">—</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="control-buttons">
        <button class="control-btn" id="prevBtn" title="Назад">
            <img src="{{ url_for('static', filename='svg/music_player/skip_previous.svg') }}" style="height: 48px;" alt="Play">
        </button>
        <button class="control-btn play-pause-btn" id="playPauseBtn" title="Пауза">
            <img id="playIcon" src="{{ url_for('static', filename='svg/music_player/play_circle.svg') }}" style="height: 64px;" alt="Play">
            <img id="pauseIcon" src="{{ url_for('static', filename='svg/music_player/pause_circle.svg') }}" style="height: 64px;" alt="Pause" style="display: none;">
        </button>
        <button class="control-btn" id="nextBtn" title="Вперед">
            <img src="{{ url_for('static', filename='svg/music_player/skip_next.svg') }}" style="height: 48px;" alt="Play">
        </button>
      </div>
      <div class="progress-container">
        <span class="time-current" id="currentTime">0:00</span>
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0" step="0.1">
        <span class="time-duration" id="durationTime">0:00</span>
      </div>
    </div>

    <div class="volume-control">
        <img id="playIcon" src="{{ url_for('static', filename='svg/music_player/volume.svg') }}" style="height: 36px;" alt="Play">
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
    </div>
  </div>
</div>

<script>
    const tracks = [{% for track in album.tracks %}{title: '{{ track.title }}', artist: '{{ track.artist }}', src: '{{ url_for('static', filename=track.src) }}', filename: '{{ track.filename }}', duration: '{{ track.duration }}' }, {% endfor %}];
    console.log(tracks)
</script>
<script src="{{ url_for('static', filename='js/player.js') }}"></script>
</div>
<!-- <div class="right">

</div> -->
</main>
<script src="{{ url_for('static', filename='js/script.js' )}}"></script>

<footer>
</footer>
</body>
</html>
