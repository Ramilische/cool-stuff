<!DOCTYPE html>
<html lang="ru-ru">
<head>
    <title>{{ title }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
<header>
    <nav>
        {% for item in nav %}
        <a href="{{ item.url }}">{{ item.title }}</a>
        {% endfor %}
    </nav>
</header>
<main>
    {% block content %}
    {% endblock%}
</main>
<footer></footer>
</body>
</html>
